<!DOCTYPE html>
<html>
<head>
    <title>AI Study Assistant</title>
    <style>
       
body {
    font-family: Arial;
    background-color: #f5f5f5;
    padding: 20px;
}

h1 {
    text-align: center;
}

#chatBox {
    background: white;
    height: 400px;
    overflow-y: auto;
    padding: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-top: 15px;
}

.user {
    text-align: right;
    background: #d1e7ff;
    padding: 8px 12px;
    border-radius: 10px;
    margin: 8px;
    display: inline-block;
    max-width: 70%;
}

.bot {
    text-align: left;
    background: #e2ffe2;
    padding: 8px 12px;
    border-radius: 10px;
    margin: 8px;
    display: inline-block;
    max-width: 70%;
}

input {
    padding: 10px;
    width: 70%;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #007bff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}

    </style>
</head>

<body>

<h1>AI Study Assistant 🤖</h1>

<input type="text" id="question" placeholder="Ask something..." />
<button onclick="askQuestion()">Ask</button>

<div id="chatBox"></div>

<!-- ✅ SCRIPT IS HERE (inside HTML) -->
<script>
const input = document.getElementById("question");
const chatBox = document.getElementById("chatBox");

// ENTER key support
input.addEventListener("keypress", function (e) {
    if (e.key === "Enter") {
        askQuestion();
    }
});

async function askQuestion() {
    let question = input.value.trim();
    if (question === "") return;

    // Show user message
    chatBox.innerHTML += `<div class="user">You: ${question}</div>`;

    // Show loading
    chatBox.innerHTML += `<div class="bot" id="loading">AI: typing...</div>`;

    scrollToBottom();

    let response = await fetch("https://ai-study-assistant-1-h34m.onrender.com/ask",{
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ question: question })
    });

    let data = await response.json();

    // Remove loading
    document.getElementById("loading").remove();

    // Show answer
    chatBox.innerHTML += `<div class="bot">AI: ${data.answer}</div>`;

    input.value = "";
    scrollToBottom();
}

function scrollToBottom() {
    chatBox.scrollTop = chatBox.scrollHeight;
}
</script>

</body>
</html>
